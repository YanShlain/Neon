services:
  db:
    image: postgres:latest
    container_name: neon_db       # This names the container 'neon_db'
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}         # Reads from Windows env or .env file
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # Reads from Windows env or .env file
      POSTGRES_DB: ${POSTGRES_DB:-main} # Fallback to 'mydatabase' if unset
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
